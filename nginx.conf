server {
	listen 3000;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	gzip on;
	gzip_comp_level 6;
	gzip_min_length 1024;
	gzip_types
		text/plain
		text/css
		text/xml
		application/javascript
		application/json
		application/xml
		image/svg+xml;

	location /assets/ {
		try_files $uri =404;
		access_log off;
		expires 1y;
		add_header Cache-Control "public, immutable";
	}

	location = /robots.txt {
		try_files $uri =404;
		access_log off;
	}

	location = /sitemap.xml {
		try_files $uri =404;
		access_log off;
	}

	location / {
		try_files $uri $uri/ /index.html;
	}
}
